<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Hospital Reviva</title>
<link rel="icon" href="assets/logo-reviva.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1E2A28; --primary:#2C5F5A; --muted:#8A928F; --line:#DEDACD; --bg:#F4F2EA; --card:#FFFFFF; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Public Sans",sans-serif; background:var(--bg); color:var(--ink);
        min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .box{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:34px 30px;
        width:100%; max-width:380px; box-shadow:0 12px 40px rgba(30,42,40,.08); }
  .brand{ display:flex; align-items:center; gap:12px; margin-bottom:22px; }
  .brand img{ width:44px; height:44px; border-radius:10px; object-fit:cover; }
  .brand .name{ font-family:"Fraunces",serif; font-weight:600; font-size:20px; }
  .brand .sub{ font-size:12px; color:var(--muted); }
  h1{ font-family:"Fraunces",serif; font-size:19px; margin:0 0 4px; }
  p.lead{ color:var(--muted); font-size:13px; margin:0 0 20px; }
  label{ display:block; font-size:12.5px; font-weight:600; margin:14px 0 6px; }
  input{ width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:9px; font-size:14px;
         font-family:inherit; background:#fff; }
  input:focus{ outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(44,95,90,.12); }
  button{ width:100%; margin-top:22px; padding:12px; border:none; border-radius:9px; background:var(--primary);
          color:#fff; font-size:14.5px; font-weight:600; font-family:inherit; cursor:pointer; }
  button:disabled{ opacity:.6; cursor:default; }
  .msg{ margin-top:16px; font-size:13px; padding:10px 12px; border-radius:8px; display:none; }
  .msg.err{ display:block; background:#FBEAE6; color:#8B4A3A; border:1px solid #E7C3B9; }
  .foot{ margin-top:18px; font-size:11.5px; color:var(--muted); line-height:1.5; }
</style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <img src="assets/logo-reviva.png" alt="" onerror="this.style.display='none'">
      <div>
        <div class="name">Hospital Reviva</div>
        <div class="sub">Escrituração e Estoque</div>
      </div>
    </div>
    <h1>Entrar no sistema</h1>
    <p class="lead">Acesso restrito ao Responsável Técnico.</p>

    <label for="email">E-mail</label>
    <input id="email" type="email" autocomplete="username" placeholder="voce@exemplo.com">
    <label for="senha">Senha</label>
    <input id="senha" type="password" autocomplete="current-password" placeholder="••••••••">
    <button id="btn" onclick="entrar()">Entrar</button>
    <div class="msg err" id="msg"></div>
    <div class="foot">Dados sensíveis de pacientes e controlados — protegido por autenticação (LGPD).</div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js"></script>
<script src="assets/supabase.js"></script>
<script>
  // Se já estiver logado, vai direto para o painel.
  getSession().then((s) => { if (s) window.location.href = "index.html"; });

  const msg = document.getElementById("msg");
  function erro(t){ msg.textContent = t; msg.className = "msg err"; }

  async function entrar(){
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value;
    const btn = document.getElementById("btn");
    if(!email || !senha){ erro("Preencha e-mail e senha."); return; }
    btn.disabled = true; btn.textContent = "Entrando…";
    try{
      const { error } = await window.SB.auth.signInWithPassword({ email, password: senha });
      if(error) throw error;
      window.location.href = "index.html";
    }catch(e){
      erro(e.message === "Invalid login credentials" ? "E-mail ou senha incorretos." : (e.message || "Erro ao entrar."));
      btn.disabled = false; btn.textContent = "Entrar";
    }
  }
  document.getElementById("senha").addEventListener("keydown", (e)=>{ if(e.key==="Enter") entrar(); });
</script>
</body>
</html>
